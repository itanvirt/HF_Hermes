name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: itanvirt/hf_hermes
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN repo secret is not set. Add a Hugging Face write token under" >&2
            echo "Settings -> Secrets and variables -> Actions -> New repository secret." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" "HEAD:main" --force
