<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} · Hermes Agent</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .term-area { padding: 0; }
        #jupyterFrame { width: 100%; height: 100%; border: 0; display: block; }
    </style>
</head>
<body class="term-page">
    <div class="term-bar">
        <div class="term-bar-title">
            <span class="term-bar-prompt">$</span>
            <span>{{ page_title }}</span>
        </div>
        <div class="spacer"></div>
        <a class="btn sm ghost" href="/" style="text-decoration:none;">&larr; Dashboard</a>
        <a class="btn sm ghost" href="/logout" style="text-decoration:none;">Logout</a>
    </div>
    <div class="term-area" id="termWrap">
        <iframe id="jupyterFrame" src="/jupyter/lab" title="Terminal" allow="clipboard-read; clipboard-write"></iframe>
    </div>
</body>
</html>
